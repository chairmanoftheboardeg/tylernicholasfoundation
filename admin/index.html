<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Portal | Tyler Nicholas Foundation</title>
    
    <link rel="icon" href="https://i.ibb.co/DgTcFQhD/non-profit-logo-Made-with-Poster-My-Wall.jpg" type="image/jpeg" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] },
                    colors: { brand: { dark: '#0A0F1C', muted: '#6B7280' }, eco: { green: '#059669', light: '#ECFDF5', dark: '#047857', sand: '#FDFBF7' } },
                    boxShadow: { 'soft': '0 20px 40px -15px rgba(0,0,0,0.05)', 'card': '0 10px 30px -10px rgba(5, 150, 105, 0.15)', 'glow': '0 0 40px -10px rgba(5, 150, 105, 0.3)' }
                }
            }
        }
    </script>

    <style>
        body { background-color: #F9FAFB; -webkit-font-smoothing: antialiased; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .admin-input { @apply w-full rounded-xl bg-white border border-gray-200 px-4 py-3 text-brand-dark text-sm outline-none transition-all focus:border-eco-green focus:ring-2 focus:ring-eco-green/20; }
        
        /* Fixed Table Layout */
        .admin-table-container { @apply w-full overflow-x-auto bg-white border border-gray-100 rounded-[2rem] shadow-card; }
        .admin-table { @apply w-full text-left border-collapse table-auto; }
        .admin-table th { @apply px-6 py-5 bg-[#F9FAFB] text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100; }
        .admin-table td { @apply px-6 py-5 border-b border-gray-50 text-sm text-brand-dark align-middle transition-colors; }
        .admin-table tr:hover td { @apply bg-eco-light/30; }
        .admin-table tr:last-child td { @apply border-b-0; }

        /* Toast */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; color: #0A0F1C; padding: 16px 24px; border-radius: 12px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); border-left: 4px solid #059669; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; align-items: center; gap: 12px; }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: #EF4444; }

        .modal-overlay { background: rgba(10, 15, 28, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="text-brand-dark h-screen overflow-hidden flex relative">

    <div id="login-view" class="fixed inset-0 flex items-center justify-center bg-brand-dark z-[200] transition-opacity duration-500">
        <div class="bg-white rounded-3xl shadow-2xl p-10 md:p-12 w-full max-w-md relative z-10 fade-in">
            <div class="text-center mb-8">
                <img src="https://i.ibb.co/DgTcFQhD/non-profit-logo-Made-with-Poster-My-Wall.jpg" alt="TNF Logo" class="w-16 h-16 rounded-full mx-auto mb-4 shadow-sm">
                <h2 class="text-2xl font-heading font-black text-brand-dark tracking-tight uppercase">System Portal</h2>
                <p class="text-gray-500 text-sm mt-2">Access restricted to Admin & Staff.</p>
            </div>
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <input type="email" id="login-email" class="admin-input" required placeholder="Email Address">
                <input type="password" id="login-pass" class="admin-input" required placeholder="Password">
                <button type="submit" id="btn-login" class="w-full bg-brand-dark hover:bg-eco-green text-white font-heading font-bold py-4 rounded-xl transition-all shadow-md text-xs uppercase tracking-widest flex items-center justify-center gap-2">
                    Authenticate <i class="fa-solid fa-lock"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="routing-loader" class="fixed inset-0 bg-white z-[150] hidden flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-eco-green mb-4"></i>
        <p class="font-heading font-bold text-brand-dark tracking-widest uppercase text-sm animate-pulse">Routing Access...</p>
    </div>

    <div id="dashboard-view" class="hidden w-full h-full flex bg-[#F9FAFB]">
        
        <aside class="w-64 bg-brand-dark text-white flex flex-col h-full shadow-2xl z-20 flex-shrink-0">
            <div class="p-6 border-b border-white/10 flex items-center gap-3">
                <img src="https://i.ibb.co/DgTcFQhD/non-profit-logo-Made-with-Poster-My-Wall.jpg" alt="TNF Logo" class="w-8 h-8 rounded-full">
                <span class="font-heading font-bold text-lg tracking-tight">TNF Admin</span>
            </div>
            <div class="flex-grow py-6 px-4 overflow-y-auto space-y-1">
                <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-3 mt-2">Content</p>
                <button onclick="switchTab('tab-news', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-white/10 hover:text-white transition-all bg-white/10 text-white"><i class="fa-solid fa-newspaper w-5"></i> News</button>
                <button onclick="switchTab('tab-impact_metrics', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/10 hover:text-white transition-all"><i class="fa-solid fa-chart-line w-5"></i> Metrics</button>
                <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-8 mb-3">Community</p>
                <button onclick="switchTab('tab-volunteers', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/10 hover:text-white transition-all"><i class="fa-solid fa-handshake w-5"></i> Volunteers</button>
                <button onclick="switchTab('tab-contacts', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/10 hover:text-white transition-all"><i class="fa-solid fa-inbox w-5"></i> Contacts</button>
                <button onclick="switchTab('tab-events', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/10 hover:text-white transition-all"><i class="fa-solid fa-calendar w-5"></i> Events</button>
                <p class="px-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-8 mb-3">System</p>
                <button onclick="switchTab('tab-profiles', this)" class="sidebar-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-400 hover:bg-white/10 hover:text-white transition-all"><i class="fa-solid fa-id-badge w-5"></i> Staff Directory</button>
            </div>
            <div class="p-6 border-t border-white/10">
                <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 text-[10px] uppercase font-bold text-gray-400 hover:bg-red-500/10 hover:text-red-400 transition-all">Sign Out</button>
            </div>
        </aside>

        <main class="flex-grow flex flex-col h-full overflow-hidden">
            <header class="h-24 bg-white border-b border-gray-100 flex items-center justify-between px-10 flex-shrink-0 z-10">
                <h2 id="header-title" class="text-3xl font-heading font-black text-brand-dark tracking-tight">Database Manager</h2>
                <div class="flex items-center gap-4">
                    <button onclick="fetchCurrentTabData()" class="w-12 h-12 rounded-full border border-gray-200 flex items-center justify-center text-gray-500 hover:text-eco-green transition-all"><i class="fa-solid fa-rotate-right"></i></button>
                    <button onclick="openModal(currentTab)" id="btn-add-new" class="bg-brand-dark hover:bg-eco-green text-white px-6 py-3 rounded-xl font-heading font-bold text-xs uppercase tracking-widest shadow-md transition-all">Add New</button>
                </div>
            </header>

            <div class="flex-grow overflow-y-auto p-10">
                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead id="table-head"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="edit-modal" class="fixed inset-0 modal-overlay z-[300] hidden flex items-center justify-center p-6 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-2xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]" id="edit-modal-content">
            <div class="px-10 py-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h3 id="modal-title" class="text-2xl font-heading font-black text-brand-dark tracking-tight">Editor</h3>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-400 hover:text-brand-dark transition-all"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-10 overflow-y-auto flex-grow">
                <form id="edit-form" class="space-y-6" onsubmit="saveRecord(event)">
                    <input type="hidden" id="edit-id" value="">
                    <input type="hidden" id="edit-table" value="">
                    <div id="dynamic-form-fields" class="space-y-6"></div>
                </form>
            </div>
            <div class="px-10 py-6 border-t border-gray-100 bg-gray-50 flex justify-end gap-4">
                <button onclick="closeModal()" class="px-8 py-3.5 rounded-xl border border-gray-200 text-gray-600 font-bold text-sm hover:bg-white transition-all">Cancel</button>
                <button onclick="document.getElementById('edit-form').requestSubmit()" class="px-8 py-3.5 rounded-xl bg-brand-dark text-white font-bold text-sm hover:bg-eco-green transition-all shadow-md">Apply Changes</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const SUPABASE_URL = 'https://eeqgfchvchpdulfybsjg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlcWdmY2h2Y2hwZHVsZnlic2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MDEyMzYsImV4cCI6MjA5MDI3NzIzNn0.2Psw_X2TB1r8iLb46WWWANhVuDvoDPnUMjaWykvqd1s';
        let supabase;
        let currentTab = 'news';

        document.addEventListener("DOMContentLoaded", () => {
            const checkSupabase = setInterval(() => {
                if (window.supabase) {
                    clearInterval(checkSupabase); 
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    checkUserSession();
                }
            }, 100);
        });

        async function checkUserSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                document.getElementById('login-view').classList.remove('hidden');
                return;
            }

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('routing-loader').classList.remove('hidden');
            document.getElementById('routing-loader').classList.add('flex');

            const { data: profile } = await supabase.from('tnf_profiles').select('*').eq('id', session.user.id).single();

            if (profile && profile.role === 'admin') {
                document.getElementById('routing-loader').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                fetchCurrentTabData();
            } else {
                window.location.href = '/staff/';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) showToast(error.message, 'error'); else checkUserSession();
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.classList.remove('bg-white/10', 'text-white');
                btn.classList.add('text-gray-400');
            });
            btnElement.classList.remove('text-gray-400');
            btnElement.classList.add('bg-white/10', 'text-white');
            currentTab = tabId.replace('tab-', '');
            fetchCurrentTabData();
        }

        async function fetchCurrentTabData() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-20 text-gray-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4 text-eco-green"></i><br>Fetching records...</td></tr>`;

            const tableName = `tnf_${currentTab}`;
            const { data, error } = await supabase.from(tableName).select('*').order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-20 text-red-500">Error: ${error.message}</td></tr>`;
                return;
            }

            // DYNAMIC HEADER GENERATION
            if (currentTab === 'news') thead.innerHTML = `<tr><th>Title</th><th>Published</th><th class="text-right">Actions</th></tr>`;
            else if (currentTab === 'volunteers') thead.innerHTML = `<tr><th>Applicant</th><th>Area</th><th>Status</th><th>Applied</th><th class="text-right">Actions</th></tr>`;
            else if (currentTab === 'contacts') thead.innerHTML = `<tr><th>Sender</th><th>Subject</th><th>Status</th><th>Received</th><th class="text-right">Actions</th></tr>`;
            else if (currentTab === 'impact_metrics') thead.innerHTML = `<tr><th>Label</th><th>Value</th><th>Icon</th><th class="text-right">Actions</th></tr>`;
            else if (currentTab === 'events') thead.innerHTML = `<tr><th>Event</th><th>Date</th><th>Status</th><th class="text-right">Actions</th></tr>`;
            else if (currentTab === 'profiles') thead.innerHTML = `<tr><th>Staff Name</th><th>Email</th><th>Role</th><th class="text-right">Actions</th></tr>`;

            tbody.innerHTML = data.map(row => {
                const date = row.created_at || row.published_at || row.event_date;
                const formattedDate = date ? new Date(date).toLocaleDateString() : 'N/A';
                
                let content = '';
                if (currentTab === 'news') content = `<td><div class="font-bold">${row.title}</div></td><td>${formattedDate}</td>`;
                else if (currentTab === 'volunteers') content = `<td><div class="font-bold">${row.full_name}</div><div class="text-xs text-gray-400">${row.email}</div></td><td>${row.interest_area}</td><td>${row.status}</td><td>${formattedDate}</td>`;
                else if (currentTab === 'contacts') content = `<td><div class="font-bold">${row.full_name}</div></td><td>${row.subject}</td><td>${row.status}</td><td>${formattedDate}</td>`;
                else if (currentTab === 'impact_metrics') content = `<td><div class="font-bold">${row.metric_label}</div></td><td>${row.metric_value}</td><td>${row.icon_class}</td>`;
                else if (currentTab === 'events') content = `<td><div class="font-bold">${row.title}</div></td><td>${formattedDate}</td><td>${row.status}</td>`;
                else if (currentTab === 'profiles') content = `<td><div class="font-bold">${row.full_name}</div></td><td>${row.email}</td><td>${row.role}</td>`;

                return `<tr>${content}<td class="text-right">
                    <button onclick="openModal('${currentTab}', '${row.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-lg mr-2"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deleteRecord('${tableName}', '${row.id}')" class="text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                </td></tr>`;
            }).join('');
        }

        async function deleteRecord(tableName, id) {
            if (!confirm("Are you sure you want to delete this?")) return;
            const { error } = await supabase.from(tableName).delete().eq('id', id);
            if (error) showToast(error.message, 'error'); else { showToast("Record Deleted"); fetchCurrentTabData(); }
        }

        async function openModal(type, id = null) {
            const modal = document.getElementById('edit-modal');
            const formFields = document.getElementById('dynamic-form-fields');
            document.getElementById('edit-id').value = id || '';
            document.getElementById('edit-table').value = type;

            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('edit-modal-content').classList.remove('scale-95'); }, 10);

            let rowData = {};
            if (id) {
                const { data } = await supabase.from(`tnf_${type}`).select('*').eq('id', id).single();
                rowData = data || {};
            }

            let html = '';
            if (type === 'news') {
                html += createField('Title', 'title', 'text', rowData.title);
                html += createField('Summary', 'short_summary', 'text', rowData.short_summary);
                html += createField('Content', 'content', 'textarea', rowData.content);
            } else if (type === 'volunteers' || type === 'contacts') {
                html += createField('Status', 'status', 'text', rowData.status);
                html += createField('Name', 'full_name', 'text', rowData.full_name);
            } else if (type === 'impact_metrics') {
                html += createField('Label', 'metric_label', 'text', rowData.metric_label);
                html += createField('Value', 'metric_value', 'number', rowData.metric_value);
            } else if (type === 'events') {
                html += createField('Title', 'title', 'text', rowData.title);
                html += createField('Status', 'status', 'text', rowData.status);
            } else if (type === 'profiles') {
                html += createField('Role (admin or staff)', 'role', 'text', rowData.role);
            }

            formFields.innerHTML = html;
        }

        function createField(label, id, type, value) {
            let input = `<input type="${type}" id="form-${id}" value="${value || ''}" class="admin-input">`;
            if (type === 'textarea') input = `<textarea id="form-${id}" class="admin-input" rows="5">${value || ''}</textarea>`;
            return `<div><label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">${label}</label>${input}</div>`;
        }

        async function saveRecord(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const type = document.getElementById('edit-table').value;
            const tableName = `tnf_${type}`;
            const fields = document.querySelectorAll('#dynamic-form-fields input, #dynamic-form-fields textarea');
            let payload = {};
            fields.forEach(f => { payload[f.id.replace('form-', '')] = f.value; });

            const { error } = id 
                ? await supabase.from(tableName).update(payload).eq('id', id)
                : await supabase.from(tableName).insert(payload);

            if (error) showToast(error.message, 'error'); 
            else { showToast("Saved Successfully"); closeModal(); fetchCurrentTabData(); }
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('opacity-0');
            document.getElementById('edit-modal-content').classList.add('scale-95');
            setTimeout(() => document.getElementById('edit-modal').classList.add('hidden'), 300);
        }

        function showToast(m, t = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${t}`;
            toast.innerHTML = `<i class="fa-solid fa-circle-check text-eco-green"></i> <span>${m}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3000);
        }
    </script>
</body>
</html>
