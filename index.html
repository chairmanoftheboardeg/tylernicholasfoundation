<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Renovation | Tyler Nicholas Foundation</title>
    
    <link rel="icon" href="https://i.ibb.co/dJ3fHQG7/TNF-LOGO.jpg" type="image/jpeg" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] },
                    colors: { brand: { dark: '#2C2D31', darker: '#1E1E22' }, eco: { green: '#059669', hover: '#047857' } }
                }
            }
        }
    </script>

    <style>
        /* Disable right-click and text selection globally */
        body { 
            background-color: #2C2D31; 
            -webkit-font-smoothing: antialiased; 
            user-select: none; /* Prevents text highlighting */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        img { 
            pointer-events: none; 
        }

        /* Countdown Circle Styles */
        .timer-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.1);
            transition: border-color 0.3s ease;
        }
        .timer-circle:hover {
            border-color: #059669; /* Eco-green glow on hover */
        }
        
        @media (min-width: 768px) {
            .timer-circle {
                width: 120px;
                height: 120px;
            }
        }

        /* Fade-in Animation */
        .fade-in { animation: fadeIn 1.2s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white px-6 relative overflow-hidden">

    <div class="absolute inset-0 bg-gradient-to-b from-brand-darker to-brand-dark z-0"></div>

    <div class="relative z-10 w-full max-w-4xl mx-auto text-center flex flex-col items-center fade-in">
        
        <img src="https://i.ibb.co/dJ3fHQG7/TNF-LOGO.jpg" alt="TNF Logo" class="w-24 h-24 md:w-32 md:h-32 rounded-full border-2 border-gray-600 shadow-2xl mb-8">

        <h1 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold tracking-wide mb-4">
            WEBSITE UNDER RENOVATION
        </h1>
        <p class="text-gray-300 text-lg md:text-xl font-light mb-12 tracking-wide">
            We are upgrading our digital infrastructure. Please visit back soon!
        </p>

        <div class="flex flex-wrap justify-center gap-4 md:gap-6 mb-16">
            <div class="timer-circle">
                <span id="days" class="text-3xl md:text-4xl font-heading font-bold text-white leading-none mb-1">00</span>
                <span class="text-[10px] md:text-xs text-eco-green uppercase tracking-widest font-bold">Days</span>
            </div>
            <div class="timer-circle">
                <span id="hours" class="text-3xl md:text-4xl font-heading font-bold text-white leading-none mb-1">00</span>
                <span class="text-[10px] md:text-xs text-eco-green uppercase tracking-widest font-bold">Hours</span>
            </div>
            <div class="timer-circle">
                <span id="minutes" class="text-3xl md:text-4xl font-heading font-bold text-white leading-none mb-1">00</span>
                <span class="text-[10px] md:text-xs text-eco-green uppercase tracking-widest font-bold">Minutes</span>
            </div>
            <div class="timer-circle">
                <span id="seconds" class="text-3xl md:text-4xl font-heading font-bold text-white leading-none mb-1">00</span>
                <span class="text-[10px] md:text-xs text-eco-green uppercase tracking-widest font-bold">Seconds</span>
            </div>
        </div>

        <div class="w-full max-w-lg mx-auto mb-16">
            <form id="notify-form" class="flex flex-col sm:flex-row gap-3 sm:gap-0 shadow-2xl">
                <input type="email" id="email-input" placeholder="Enter Email Address" required 
                    class="w-full px-6 py-4 rounded-full sm:rounded-r-none sm:rounded-l-full text-brand-dark focus:outline-none font-medium">
                <button type="submit" id="btn-submit" 
                    class="bg-[#8B5CF6] hover:bg-[#7C3AED] text-white font-heading font-bold uppercase tracking-widest text-sm px-8 py-4 rounded-full sm:rounded-l-none sm:rounded-r-full transition-colors whitespace-nowrap">
                    Subscribe
                </button>
            </form>
            <p id="form-msg" class="mt-4 text-sm hidden font-medium"></p>
        </div>

        <div class="border-t border-gray-700 w-full pt-8 flex flex-col md:flex-row justify-center items-center gap-6 md:gap-12 text-sm text-gray-400">
            <a href="mailto:chairperson@tyler-nicholas-foundation.online" class="hover:text-eco-green transition-colors flex items-center">
                <i class="fa-solid fa-envelope-open-text mr-2"></i> chairperson@tyler-nicholas-foundation.online
            </a>
            <span class="hidden md:block text-gray-700">|</span>
            <a href="mailto:nicholasfoundation.sc@gmail.com" class="hover:text-eco-green transition-colors flex items-center">
                <i class="fa-solid fa-envelope mr-2"></i> nicholasfoundation.sc@gmail.com
            </a>
        </div>
        
    </div>

    <script>
        // ----------------------------------------------------------------
        // 1. SECURITY (Disable Right Click)
        // ----------------------------------------------------------------
        document.addEventListener("contextmenu", function(e) {
            e.preventDefault();
        });

        // ----------------------------------------------------------------
        // 2. COUNTDOWN TIMER (Target: June 20, 2026)
        // ----------------------------------------------------------------
        const targetDate = new Date("June 20, 2026 00:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Pad with zeros if less than 10
            document.getElementById("days").innerText = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerText = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerText = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerText = seconds < 10 ? "0" + seconds : seconds;
        }, 1000);

        // ----------------------------------------------------------------
        // 3. SUPABASE SUBSCRIPTION LOGIC
        // ----------------------------------------------------------------
        const supabaseUrl = 'https://qcwldyvecokspamcjgbl.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjd2xkeXZlY29rc3BhbWNqZ2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTYzNjksImV4cCI6MjA5NDA5MjM2OX0.4du52QpdsRaUATJ5qXeA1sd7zVEOPSlJ1KJJ9KQvjHk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('notify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailInput = document.getElementById('email-input');
            const msgObj = document.getElementById('form-msg');
            const btn = document.getElementById('btn-submit');
            const email = emailInput.value.trim();

            msgObj.style.display = 'block';
            msgObj.innerText = "Subscribing...";
            msgObj.className = "mt-4 text-sm text-gray-400 font-medium";
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const { error } = await supabase.from('tnf_newsletter_subscribers').insert([{ email: email }]);

            if (error) {
                if (error.code === '23505') { 
                    msgObj.innerText = "This email is already on the list.";
                } else {
                    msgObj.innerText = "An error occurred. Please try again.";
                }
                msgObj.classList.add("text-red-400");
                msgObj.classList.remove("text-gray-400");
            } else {
                msgObj.innerText = "Successfully subscribed! We will notify you upon launch.";
                msgObj.classList.add("text-eco-green");
                msgObj.classList.remove("text-gray-400");
                emailInput.value = ''; 
            }
            
            btn.disabled = false;
            btn.innerText = 'SUBSCRIBE';
        });
    </script>
</body>
</html>
